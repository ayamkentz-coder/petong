      height: 32px;

    .hidden-force { display: none !important; }

    

    .scroll-hide::-webkit-scrollbar { height: 6px; }

    .scroll-hide::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 4px; }

      "Backstage Concert Vibes", "High-Tech Aircraft Cockpit", "Cyberpunk Repair Shop", "Intergalactic War Scene"

    ];





    let settings = {

      ultraRealistic: true, skinTexture: true, perfectAnatomy: true, dynamicExpressions: true, 

      dynamicAngles: true, motionEffects: true, cinematicLighting: true, highRes: true,

      bokehBackground: true, hdrEffect: false, vibrantColors: false, filmGrain: false

    };



    const toggleLabels = {

      ultraRealistic: "Super Realistis (Kamera DSLR)", skinTexture: "Tekstur Kulit Nyata Pori-Pori",

      perfectAnatomy: "Perbaikan Anatomi AI", dynamicExpressions: "Ekspresi Acak (Senyum/Manyun)",

      dynamicAngles: "Sudut Kamera Dinamis (Acak)", motionEffects: "Efek Gerakan (Angin/Motion Blur)",

      cinematicLighting: "Pencahayaan Studio/Sinematik", highRes: "Resolusi 8K (Detail Tajam)", 

      bokehBackground: "Background Blur (Bokeh Kuat)", hdrEffect: "Efek HDR Tinggi", 

      vibrantColors: "Warna Kontras & Cerah", filmGrain: "Gaya Film Analog Vintage"

    };



    function getRatioFraction(ratio) {

      if (ratio === '9:16') return '9/16';

      if (ratio === '16:9') return '16/9';

      return '1/1';

    }



    // --- Inisialisasi Aplikasi ---

    window.onload = () => {

      const catSelect = document.getElementById('category-select');

      categories.forEach(cat => { catSelect.innerHTML += `<option value="${cat}">${cat}</option>`; });

      renderSettings();

      renderGlobalToggles();

      lucide.createIcons();

    };



    // --- UTILITY: STOP PROCESS ---

    function setProcessState(isRunning) {

      isProcessRunning = isRunning;

      const stopBtn = document.getElementById('btn-global-stop');

      if (isRunning) {

        stopBtn.classList.remove('translate-y-24', 'opacity-0');

        stopBtn.classList.add('translate-y-0', 'opacity-100');

      } else {

        stopBtn.classList.remove('translate-y-0', 'opacity-100');

        stopBtn.classList.add('translate-y-24', 'opacity-0');

      }

    }



    function stopAllProcesses() {

      if (isProcessRunning) {

        globalAbortController.abort(); // Batalkan semua request fetch yang sedang jalan

        globalAbortController = new AbortController(); // Reset controller baru

        setProcessState(false);

        showNotification("🛑 Semua proses AI telah dihentikan secara paksa.", "error");

        

        // Reset UI Buttons

        document.getElementById('icon-master').classList.remove('hidden-force');

        document.getElementById('spinner-master').classList.add('hidden-force');

        document.getElementById('text-master').innerText = "Render 12 Adegan Sekarang";

        document.getElementById('btn-generate-master').disabled = false;



        document.getElementById('icon-extend').classList.remove('hidden-force');

        document.getElementById('spinner-extend-main').classList.add('hidden-force');

        document.getElementById('text-extend').innerText = "Tambah 12 Adegan Lagi";

        document.getElementById('btn-extend-master').disabled = false;



        // Bersihkan status loading di adegan yang menggantung

        scenes.forEach(s => {

          if (s.status === 'loading') {

            s.status = 'error';

            const statusDiv = document.getElementById(`status-${s.id}`);

            const btnRegenImg = document.getElementById(`btn-regen-img-${s.id}`);

            if(statusDiv) {

              statusDiv.innerHTML = `<i data-lucide="x" class="w-8 h-8 text-red-500 mb-2"></i><span class="text-[10px] font-bold text-red-500 text-center px-2">Dihentikan</span>`;

              lucide.createIcons();

            }

            if(btnRegenImg) btnRegenImg.disabled = false;

          }

        });

      }

    }



    function toggleGlobal(key) { globalToggles[key] = !globalToggles[key]; renderGlobalToggles(); }

    function renderGlobalToggles() {

      for(let key in globalToggles) {

        const bg = document.getElementById(`toggle-${key}-bg`), dot = document.getElementById(`toggle-${key}-dot`);

        if (bg && dot) {

          if (globalToggles[key]) {

            bg.classList.replace('bg-gray-300', 'bg-indigo-500'); dot.classList.add('translate-x-4');

          } else {

            bg.classList.replace('bg-indigo-500', 'bg-gray-300'); dot.classList.remove('translate-x-4');

          }

        }

      }

    }



    // --- Utility: API Calls dengan ABORT ---

    const fetchWithBackoff = async (url, options, retries = 5) => {

      const delays = [1000, 2000, 4000, 8000, 16000];

      for (let i = 0; i < retries; i++) {

        try {

          options.signal = globalAbortController.signal; // Inject abort signal

          const response = await fetch(url, options);

          if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);

          return await response.json();

        } catch (error) {

          if (error.name === 'AbortError') throw error; // Berhenti langsung jika dibatalkan user

          if (i === retries - 1) throw error;

          await new Promise(res => setTimeout(res, delays[i]));

        }

      }

    };



    const generateText = async (prompt, isJson = false) => {

      const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;

      const payload = {

        contents: [{ parts: [{ text: prompt }] }],

        safetySettings: [

          { category: "HARM_CATEGORY_HARASSMENT", threshold: "BLOCK_NONE" },

          { category: "HARM_CATEGORY_HATE_SPEECH", threshold: "BLOCK_NONE" },

          { category: "HARM_CATEGORY_SEXUALLY_EXPLICIT", threshold: "BLOCK_NONE" },

          { category: "HARM_CATEGORY_DANGEROUS_CONTENT", threshold: "BLOCK_NONE" }

        ]

      };

      if (isJson) payload.generationConfig = { responseMimeType: "application/json" };



      const result = await fetchWithBackoff(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });

      const text = result.candidates?.[0]?.content?.parts?.[0]?.text;

      return isJson ? JSON.parse(text) : text;

    };



    // --- Image-to-Image untuk Final Scenes (Tetap Gemini Flash Image untuk Konsistensi Wajah) ---

    const generateImageWithReferences = async (prompt, activeFaces, useStrictOutfit = true, aspectRatio = "9:16") => {

      const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-image-preview:generateContent?key=${apiKey}`;

      

      let instruction = prompt + `\n\nCRITICAL INSTRUCTION: Generate a HYPER-REALISTIC, RAW PHOTOGRAPH. Use a 35mm lens, f/1.8 aperture. High-end fashion editorial photography. ABSOLUTELY NO illustration, NO painting, NO 3D render, NO plastic skin. Must look indistinguishable from reality, with natural skin texture, visible pores, and cinematic lighting. Use the provided image strictly for facial identity.\n\n[MANDATORY FORMAT]: The final output canvas MUST strictly be in ${aspectRatio} aspect ratio format.`;

      

      if (globalToggles.safeMode) instruction += " MUST be modest, fully clothed, decent, and safe for work. NO nudity.";

      if (useStrictOutfit) instruction += " Meticulously copy the exact clothing and accessories from the extra reference images provided.";



      let parts = [{ text: instruction }];

      activeFaces.forEach(f => {

        if (f.image) parts.push({ inlineData: { mimeType: f.image.substring(f.image.indexOf(":") + 1, f.image.indexOf(";")), data: f.image.split(',')[1] } });

        if (useStrictOutfit) {

          if (f.clothingImage) parts.push({ inlineData: { mimeType: f.clothingImage.substring(f.clothingImage.indexOf(":") + 1, f.clothingImage.indexOf(";")), data: f.clothingImage.split(',')[1] } });

          if (f.accessoriesImage) parts.push({ inlineData: { mimeType: f.accessoriesImage.substring(f.accessoriesImage.indexOf(":") + 1, f.accessoriesImage.indexOf(";")), data: f.accessoriesImage.split(',')[1] } });

        }

      });



      const payload = { 

        contents: [{ role: "user", parts: parts }], 

        generationConfig: { 

          responseModalities: ["IMAGE"],

          imageConfig: { aspectRatio: aspectRatio }

        },

        safetySettings: [

          { category: "HARM_CATEGORY_HARASSMENT", threshold: "BLOCK_NONE" },

          { category: "HARM_CATEGORY_HATE_SPEECH", threshold: "BLOCK_NONE" },

          { category: "HARM_CATEGORY_SEXUALLY_EXPLICIT", threshold: "BLOCK_NONE" },

          { category: "HARM_CATEGORY_DANGEROUS_CONTENT", threshold: "BLOCK_NONE" }

        ]

      };



      const result = await fetchWithBackoff(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });



      const imgPart = result.candidates?.[0]?.content?.parts?.find(p => p.inlineData);

      if (imgPart && imgPart.inlineData && imgPart.inlineData.data) {

        return `data:${imgPart.inlineData.mimeType};base64,${imgPart.inlineData.data}`;

      }

      throw new Error(result.error?.message || "Gagal menghasilkan gambar dengan referensi.");

    };



    // --- PERBAIKAN MUTLAK: Text-to-Image untuk Pakaian & Aksesoris (Memaksa Imagen 4) ---

    // Memastikan file asli yang didownload benar-benar memiliki rasio 9:16, 16:9, atau 1:1

    const generateImage = async (prompt, aspectRatio = "9:16") => {

      const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-image-preview:generateContent?key=${apiKey}`;

      

      const finalPrompt = `CRITICAL INSTRUCTION: Generate a HYPER-REALISTIC RAW PHOTOGRAPH. ${prompt}. High-end cinematic color grading. Deep shadows, specular highlights. RAW human skin texture, visible pores, natural skin dewy look, non-plastic. shot on 35mm lens, moody atmospheric lighting.`;



      const payload = {

        contents: [{ parts: [{ text: finalPrompt }] }],

        generationConfig: { 

          responseModalities: ["IMAGE"],

          imageConfig: { aspectRatio: aspectRatio }

        },

        safetySettings: [

          { category: "HARM_CATEGORY_HARASSMENT", threshold: "BLOCK_NONE" },

          { category: "HARM_CATEGORY_HATE_SPEECH", threshold: "BLOCK_NONE" },

          { category: "HARM_CATEGORY_SEXUALLY_EXPLICIT", threshold: "BLOCK_NONE" },

          { category: "HARM_CATEGORY_DANGEROUS_CONTENT", threshold: "BLOCK_NONE" }

        ]

      };

      

      const result = await fetchWithBackoff(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });



      const imgPart = result.candidates?.[0]?.content?.parts?.find(p => p.inlineData);

      if (imgPart && imgPart.inlineData && imgPart.inlineData.data) {

        return `data:${imgPart.inlineData.mimeType};base64,${imgPart.inlineData.data}`;

      }

      throw new Error(result.error?.message || "Ditolak filter keamanan AI atau Gagal menghasilkan gambar.");

    };

    async function handleGenerateClothingImage(id, isSlot2 = false) {

      setProcessState(true);

      const face = faces.find(f => f.id === id);

      const inputId = isSlot2 ? `clothing2-input-${id}` : `clothing-input-${id}`;
      const faceClothingText = document.getElementById(inputId).value;
      const btnId = isSlot2 ? `btn-cloth2-img-${id}` : `btn-cloth-img-${id}`;
      const btn = document.getElementById(btnId);



      try {

        const safePrompt = globalToggles.safeMode ? "Modest, decent, fully clothed, safe for work fashion. " : "";

        const prompt = `A highly detailed product photography of a fashion outfit: ${faceClothingText}. Displayed on an invisible ghost mannequin. 1-set full body outfit design. Clean studio background. NO HUMAN, NO HEAD, NO BODY, ONLY CLOTHING. ${safePrompt}`;

        const imageUrl = await generateImage(prompt, face.aspectRatio);

        face.clothingImage = imageUrl;

        renderFaces();

        showNotification(`Gambar pakaian (${face.aspectRatio}) berhasil dirender!`, "success");

      } catch (e) { if(e.name !== 'AbortError') showNotification(`Gagal: ${e.message}`, "error"); } 

      finally { btn.innerHTML = `<i data-lucide="image" class="w-3 h-3"></i> Regen Gambar`; btn.disabled = false; lucide.createIcons(); setProcessState(false); }

    }



    async function handleGenerateClothingAuto(id, isSlot2 = false) {

      setProcessState(true);

      const face = faces.find(f => f.id === id);

      const category = document.getElementById('category-select').value;

      const conceptInput = document.getElementById('concept-input').value;

      const btn = document.getElementById(`btn-cloth-auto-${id}`); btn.innerHTML = `<span class="loader"></span>`; btn.disabled = true;



      try {

        const safeText = globalToggles.safeMode ? " MUST BE STRICTLY MODEST, DECENT, AND SAFE FOR WORK." : "";

        const storyContext = conceptInput ? `MUST STRICTLY FIT THIS STORY/CONCEPT: "${conceptInput}".` : `Theme: ${category}.`;

        const styleType = isSlot2 ? 'extremely LUXURIOUS, glamour, haute couture, accessories-heavy, expensive material' : 'VERY SIMPLE, modest, plain, everyday house clothes, casual minimal look';
        const textPrompt = `Provide ONE very detailed description (max 15 words) of a ${styleType} outfit for a ${face.gender}. ${storyContext} English language only.`;
        const cleanText = (await generateText(textPrompt)).trim();

        face.clothing = cleanText;

        document.getElementById(`clothing-input-${id}`).value = cleanText;



        const safeImgPrompt = globalToggles.safeMode ? "Modest, decent, fully clothed, safe for work fashion. " : "";

        const imgPrompt = `A highly detailed product photography of a fashion outfit: ${cleanText}. Displayed on an invisible ghost mannequin. 1-set full body outfit design. Clean studio background. NO HUMAN, NO HEAD, NO BODY, ONLY CLOTHING. ${safeImgPrompt}`;

        const imageUrl = await generateImage(imgPrompt, face.aspectRatio);

        face.clothingImage = imageUrl;

        renderFaces();

        showNotification(`Pakaian otomatis (${face.aspectRatio}) dibuat!`, "success");

      } catch (e) { if(e.name !== 'AbortError') showNotification(`Gagal: ${e.message}`, "error"); } 

      finally { btn.innerHTML = `<i data-lucide="wand-2" class="w-3 h-3"></i> Regen AI`; btn.disabled = false; lucide.createIcons(); setProcessState(false); }

    }



    async function handleGenerateAccessoriesImage(id) {

      const btn = document.getElementById(`btn-acc-img-${id}`); btn.innerHTML = `<span class="loader"></span>`; btn.disabled = true;



      try {

        const safePrompt = globalToggles.safeMode ? "Safe for work, decent. " : "";

        const prompt = `A highly detailed close-up product photography of this specific accessory: ${faceAccText}. Studio lighting, clean background, photorealistic, no human holding it. ${safePrompt}`;

        const imageUrl = await generateImage(prompt, face.aspectRatio);

        face.accessoriesImage = imageUrl;

        renderFaces();

      } catch (e) { if(e.name !== 'AbortError') showNotification(`Gagal: ${e.message}`, "error"); }

    // --- Settings UI ---

    function toggleSetting(key) { settings[key] = !settings[key]; renderSettings(); }

      for (const [key, value] of Object.entries(settings)) {

        <label class="flex items-center cursor-pointer justify-between p-3 bg-white rounded-xl border border-gray-200 shadow-sm hover:border-indigo-300 transition-colors" onclick="event.preventDefault(); toggleSetting('${key}')">

    // --- Main Rendering Process (12 Scenes / +12 Scenes) ---

    async function generateMasterPrompts(isExtension = false) {

      const concept = document.getElementById('concept-input').value;

      if (faces.length === 0) return showNotification("Tambahkan setidaknya satu referensi wajah!", "error");

      if (!concept) return showNotification("Isi konsep atau ide cerita terlebih dahulu di Langkah 1!", "error");



      setProcessState(true);

      const btnId = isExtension ? 'btn-extend-master' : 'btn-generate-master';

      const iconId = isExtension ? 'icon-extend' : 'icon-master';

      const spinnerId = isExtension ? 'spinner-extend-main' : 'spinner-master';

      const textId = isExtension ? 'text-extend' : 'text-master';

      const btn = document.getElementById(btnId);

      

      document.getElementById(iconId).classList.add('hidden-force');

      document.getElementById(spinnerId).classList.remove('hidden-force');

      document.getElementById(textId).innerText = isExtension ? "Menyusun +12 Adegan Baru..." : "Mempersiapkan 12 Adegan...";

      btn.disabled = true;



      let charactersContext = faces.map(f => {

        const isIntro = idx < 7;
        const faceCloth = isIntro ? (f.clothing || 'casual clothes') : (f.clothing2 || f.clothing || 'luxury outfit');
        const faceAcc = f.accessories || 'none';

        return `${f.name} (Gender: ${f.gender}, Age: ${f.age}, Height: ${f.height}cm, Weight: ${f.weight}kg). STRICTLY WEARING: ${faceCloth}, STRICTLY WITH ACCESSORIES: ${faceAcc}.`;

      }).join(" | ");



      let qualityModifiers = [];

      if (settings.ultraRealistic) qualityModifiers.push("ultra photorealistic, hyperrealistic, shot on 35mm lens, Sony A7R IV, premium fashion photography");

      if (settings.skinTexture) qualityModifiers.push("hyper-detailed skin texture, visible pores, natural skin glow, extremely realistic skin rendering");

      if (settings.perfectAnatomy) qualityModifiers.push("perfect anatomy, flawless facial features");

      if (settings.cinematicLighting) qualityModifiers.push("cinematic lighting, dramatic studio lighting, Rembrandt lighting");

      if (settings.highRes) qualityModifiers.push("8k resolution, highly detailed, sharp focus");

      if (settings.bokehBackground) qualityModifiers.push("depth of field, beautiful bokeh, blurred background");

      if (settings.hdrEffect) qualityModifiers.push("HDR, high dynamic range, rich details");

      if (settings.vibrantColors) qualityModifiers.push("vivid colors, rich saturation, color graded");

      if (settings.motionEffects) qualityModifiers.push("dynamic movement, hair blowing gracefully, subtle motion blur on edges");

      if (settings.filmGrain) qualityModifiers.push("analog film grain, vintage film texture");



      const baseQualityString = qualityModifiers.join(", ");



      const dynamicRules = [];

      if (settings.dynamicAngles) dynamicRules.push("VARY CAMERA ANGLES: Force different shot types randomly across the scenes (e.g., Extreme Close-Up on eyes/lips, Medium Shot, Full Body, Low Angle, High Angle, Dutch Angle). Explicitly write the camera shot in each prompt.");

      if (settings.dynamicExpressions) dynamicRules.push("VARY FACIAL EXPRESSIONS: Force different, distinct human emotions randomly across the scenes (e.g., beaming wide smile, subtle smirk, sad pout, laughing out loud, mysterious gaze, winking, surprised). Explicitly write the specific facial expression in each prompt.");

      if (globalToggles.safeMode) dynamicRules.push("MODESTY PROTOCOL: ALL characters MUST be modestly dressed. Absolutely NO nudity, NO suggestive posing, strictly safe for work.");



      let extensionContext = "";

      if (isExtension && scenes.length > 0) {

        const previousPrompts = scenes.map(s => s.prompt).join("\n- ");

        extensionContext = `\n\nEXTENSION MODE: You are adding 12 MORE scenes to an existing storyboard. The previous scenes were:\n- ${previousPrompts}\n\nYou MUST generate exactly 12 NEW and DIFFERENT scenes continuing the narrative. Do NOT repeat the previous compositions.`;

      }



      const promptText = `

        You are an expert cinematic director and AI image prompt engineer.

        I need exactly 12 image generation prompts (in ENGLISH) for a highly dynamic storyboard sequence.

        

        CORE CONCEPT: ${concept}

        CHARACTERS & WARDROBE STRICT REFERENCE: ${charactersContext}

        QUALITY MODIFIERS: ${baseQualityString}.



        CRITICAL RULES:

        1. All scenes MUST take place in the EXACT SAME location/theme based on the concept.

        2. Ensure characters wear EXACTLY the clothing/accessories specified.

        3. IDENTITY: The character is based on a real uploaded image. Write the prompt as if directing a specific actor.

        ${dynamicRules.join("\n")}

        ${extensionContext}

        

        Return a JSON array of exactly 12 strings ONLY. Make each prompt highly descriptive.

      `;



      try {

        const resultString = await generateText(promptText, true);

        const promptArray = typeof resultString === 'string' ? JSON.parse(resultString) : resultString;

        

        if (!Array.isArray(promptArray) || promptArray.length < 1) throw new Error("JSON format is invalid or empty.");



        const startIndex = isExtension ? scenes.length : 0;

        const newScenes = promptArray.map((p, idx) => ({ id: `scene-${startIndex + idx}`, prompt: p, status: 'pending', imageUrl: null }));

        

        if (isExtension) {

          scenes = [...scenes, ...newScenes];

        } else {

          scenes = newScenes;

        }

        

        renderScenesGrid(); 

        

        // Render berurutan

        for (let i = startIndex; i < scenes.length; i++) {

          if (globalAbortController.signal.aborted) break;

          await generateSingleSceneImage(scenes[i].id, scenes[i].prompt);

        }

        

        if(!globalAbortController.signal.aborted) {

          showNotification("Proses render 12 adegan selesai!", "success");

          document.getElementById('extend-container').classList.remove('hidden-force');

        }

      } catch (e) {

        if(e.name !== 'AbortError') showNotification("Gagal menghasilkan master prompt. Coba lagi.", "error");

      } finally {

        document.getElementById(iconId).classList.remove('hidden-force');

        document.getElementById(spinnerId).classList.add('hidden-force');

        document.getElementById(textId).innerText = isExtension ? "Tambah 12 Adegan Lagi" : "Render 12 Adegan Sekarang";

        btn.disabled = false;

        setProcessState(false);

      }

    }



    function renderScenesGrid() {

      const section = document.getElementById('scenes-section');

      const container = document.getElementById('scenes-container');

      section.classList.remove('hidden-force');

      

      const firstFaceRatio = faces.length > 0 ? faces[0].aspectRatio : '9:16';

      

      let html = '';

      scenes.forEach((scene, index) => {

        html += `

        <div id="card-${scene.id}" class="bg-white rounded-2xl overflow-hidden border border-gray-200 flex flex-col shadow-md">

          <div class="relative w-full bg-gray-100 flex items-center justify-center overflow-hidden border-b border-gray-200" style="aspect-ratio: ${getRatioFraction(firstFaceRatio)};">

            <div id="status-${scene.id}" class="flex flex-col items-center text-gray-500">

              <span class="flex w-3 h-3 rounded-full bg-gray-300 animate-ping mb-2"></span>

              <span class="text-xs font-bold uppercase tracking-wider">Menunggu...</span>

            </div>

            

            <img id="img-${scene.id}" src="${scene.imageUrl || ''}" class="w-full h-full object-contain bg-gray-200 transition-transform duration-700 hover:scale-105 ${scene.imageUrl ? '' : 'hidden-force'}" />

            

            <div class="absolute top-3 left-3 bg-white/90 backdrop-blur-md px-3 py-1.5 rounded-full text-xs font-black text-indigo-800 border border-white/20 shadow-sm z-10 pointer-events-none">Adegan ${index + 1}</div>

          </div>

          

          <!-- Tombol Preview & Download diletakkan di LUAR gambar agar tidak menutupi -->

          <div id="actions-${scene.id}" class="flex gap-2 p-3 bg-gray-50 ${scene.imageUrl ? '' : 'hidden-force'}">

            <button onclick="openPreview('${scene.id}')" class="flex-1 flex justify-center items-center gap-1 text-[11px] font-bold bg-white border border-gray-300 hover:bg-gray-100 py-1.5 rounded text-gray-700 transition-colors shadow-sm"><i data-lucide="maximize-2" class="w-3 h-3"></i> Preview</button>

            <button onclick="downloadSceneImage('${scene.id}', ${index})" class="flex-1 flex justify-center items-center gap-1 text-[11px] font-bold bg-indigo-600 hover:bg-indigo-700 text-white py-1.5 rounded transition-colors shadow-sm"><i data-lucide="download" class="w-3 h-3"></i> Download</button>

          </div>



          <div class="p-4 flex flex-col flex-1 border-t border-gray-100 bg-white">

            <div class="flex items-center justify-between mb-3">

              <span class="text-[11px] font-black text-gray-400 uppercase tracking-widest">Detail Prompt AI</span>

              <div class="flex gap-1">

                <button onclick="copySinglePrompt('${scene.id}')" class="text-gray-500 hover:text-indigo-600 bg-gray-100 hover:bg-indigo-50 px-2 py-1 rounded transition-colors" title="Copy Prompt"><i data-lucide="copy" class="w-3 h-3"></i></button>

                <button id="btn-regen-prompt-${scene.id}" onclick="regenerateSinglePrompt('${scene.id}')" class="text-[11px] text-indigo-600 hover:text-indigo-800 bg-indigo-50 hover:bg-indigo-100 px-2 py-1 rounded font-bold transition-colors">Regen Prompt</button>

              </div>

            </div>

            <p id="prompt-text-${scene.id}" class="text-[11px] sm:text-xs text-gray-600 line-clamp-3 hover:line-clamp-none transition-all cursor-default leading-relaxed bg-gray-50 p-2.5 rounded-lg border border-gray-200 font-mono shadow-inner relative z-10">${scene.prompt}</p>

            <div class="mt-auto pt-4">

               <button id="btn-regen-img-${scene.id}" onclick="triggerGenerateSingleImage('${scene.id}')" class="w-full flex justify-center items-center gap-2 bg-gray-50 hover:bg-gray-100 text-gray-800 text-sm py-2.5 rounded-xl font-bold border border-gray-200 shadow-sm transition-colors"><i data-lucide="wand-2" class="w-4 h-4 text-purple-600"></i> Render Ulang</button>

            </div>

          </div>

        </div>`;

      });

      container.innerHTML = html;

      lucide.createIcons();

    }



    async function triggerGenerateSingleImage(sceneId) {

      setProcessState(true);

      await generateSingleSceneImage(sceneId, document.getElementById(`prompt-text-${sceneId}`).innerText);

      setProcessState(false);

    }



    async function generateSingleSceneImage(sceneId, promptText) {

      const statusDiv = document.getElementById(`status-${sceneId}`);

      const imgEl = document.getElementById(`img-${sceneId}`);

      const actionsEl = document.getElementById(`actions-${sceneId}`);

      const btnRegenImg = document.getElementById(`btn-regen-img-${sceneId}`);

      

      const scene = scenes.find(s => s.id === sceneId);

      if(scene) scene.status = 'loading';



      imgEl.classList.add('hidden-force');

      actionsEl.classList.add('hidden-force');

      statusDiv.innerHTML = `<span class="loader border-indigo-500 mb-2"></span><span class="text-xs font-bold text-indigo-600 uppercase">Generating...</span>`;

      btnRegenImg.disabled = true;



      const masterRatio = faces.length > 0 ? faces[0].aspectRatio : "9:16";



      try {

        const hasFaceImage = faces.some(f => f.image !== null);

        let imageUrl;

        if (hasFaceImage) {

          imageUrl = await generateImageWithReferences(promptText, faces, globalToggles.strictOutfit, masterRatio);

        } else {

          let finalPrompt = promptText;

          if (globalToggles.safeMode) finalPrompt += " Modest, safe for work, fully clothed, decent, highly photorealistic.";

          imageUrl = await generateImage(finalPrompt, masterRatio);

        }

        

        if(scene) { scene.imageUrl = imageUrl; scene.prompt = promptText; scene.status = 'success'; }

        

        imgEl.src = imageUrl;

        imgEl.classList.remove('hidden-force');

        actionsEl.classList.remove('hidden-force');

        statusDiv.innerHTML = '';

      } catch (e) {

        if(scene) scene.status = 'error';

        if(e.name !== 'AbortError') {

          statusDiv.innerHTML = `<i data-lucide="x" class="w-8 h-8 text-red-500 mb-2"></i><span class="text-[10px] font-bold text-red-500 text-center px-2">Gagal/Terblokir</span>`;

          lucide.createIcons();

        }

      } finally {

        btnRegenImg.disabled = false;

      }

    }



    async function regenerateSinglePrompt(sceneId) {

      setProcessState(true);

      const scene = scenes.find(s => s.id === sceneId);

      if (!scene) return;

      

      const btnRegenPrompt = document.getElementById(`btn-regen-prompt-${sceneId}`);

      btnRegenPrompt.innerText = "Loading...";

      btnRegenPrompt.disabled = true;



      try {

        const safeText = globalToggles.safeMode ? " Ensure the generated prompt enforces modest and safe-for-work clothing." : "";

        const fixPrompt = `Tulis ulang prompt bahasa inggris ini agar lebih detail, ganti sudut kameranya secara drastis, dan berikan ekspresi wajah emosi yang BEDA DARI SEBELUMNYA. Pertahankan baju dan lokasi: "${scene.prompt}". Kembalikan hanya teks prompt bahasa inggris.${safeText}`;

        const newPrompt = (await generateText(fixPrompt)).trim();

        document.getElementById(`prompt-text-${sceneId}`).innerText = newPrompt;

        

        await generateSingleSceneImage(sceneId, newPrompt);

      } catch (e) {

        if(e.name !== 'AbortError') showNotification("Gagal regenerate prompt.", "error");

      } finally {

        btnRegenPrompt.innerText = "Regen Prompt";

        btnRegenPrompt.disabled = false;

        setProcessState(false);

      }

    }



    // --- UTILITIES: COPY & DOWNLOAD MASSAL ---

    function copyToClipboard(text) {

      const textArea = document.createElement("textarea");

      textArea.value = text;

      textArea.style.top = "0"; textArea.style.left = "0"; textArea.style.position = "fixed";

      document.body.appendChild(textArea);

      textArea.focus(); textArea.select();

      try {

        const successful = document.execCommand('copy');

        if(successful) showNotification("Berhasil disalin ke clipboard!", "success");

        else showNotification("Gagal menyalin.", "error");

      } catch (err) { showNotification("Error menyalin.", "error"); }

      document.body.removeChild(textArea);

    }



    function copySinglePrompt(sceneId) {

      const promptText = document.getElementById(`prompt-text-${sceneId}`).innerText;

      copyToClipboard(promptText);

    }



    function copyAllPrompts() {

      if(scenes.length === 0) return showNotification("Belum ada adegan dibuat.", "error");

      const allText = scenes.map((s, i) => `Adegan ${i+1}:\n${s.prompt}`).join("\n\n--------------------\n\n");

      copyToClipboard(allText);

    }



    function b64toBlob(b64Data, contentType='', sliceSize=512) {

      const byteCharacters = atob(b64Data);

      const byteArrays = [];

      for (let offset = 0; offset < byteCharacters.length; offset += sliceSize) {

        const slice = byteCharacters.slice(offset, offset + sliceSize);

        const byteNumbers = new Array(slice.length);

        for (let i = 0; i < slice.length; i++) { byteNumbers[i] = slice.charCodeAt(i); }

        const byteArray = new Uint8Array(byteNumbers);

        byteArrays.push(byteArray);

      }

      return new Blob(byteArrays, {type: contentType});

    }



    function downloadImageRobust(base64Url, filename) {

      return new Promise(resolve => {

        try {

          const block = base64Url.split(";");

          const contentType = block[0].split(":")[1];

          const realData = block[1].split(",")[1];

          const blob = b64toBlob(realData, contentType);

          const blobUrl = URL.createObjectURL(blob);

          

          const a = document.createElement('a');

          a.href = blobUrl; a.download = filename;

          document.body.appendChild(a); a.click(); document.body.removeChild(a);

          setTimeout(() => { URL.revokeObjectURL(blobUrl); resolve(); }, 300);

        } catch (e) {

          const a = document.createElement('a');

          a.href = base64Url; a.download = filename;

          document.body.appendChild(a); a.click(); document.body.removeChild(a);

          setTimeout(resolve, 300);

        }

      });

    }



    async function downloadAllImagesSequential() {

      const validScenes = scenes.filter(s => s.status === 'success' && s.imageUrl && !s.imageUrl.includes('null'));

      if(validScenes.length === 0) return showNotification("Belum ada gambar jadi yang bisa didownload.", "error");



      showNotification(`Memulai download ${validScenes.length} gambar secara berurutan...`, "info");

      

      for(let i = 0; i < validScenes.length; i++) {

        if (globalAbortController.signal.aborted) break;

        const scene = validScenes[i];

        const actualIndex = scenes.findIndex(s => s.id === scene.id);

        const filename = `FacePlayPro_Adegan_${actualIndex + 1}.png`;

        

        await downloadImageRobust(scene.imageUrl, filename);

        await new Promise(r => setTimeout(r, 600));

      }

      if(!globalAbortController.signal.aborted) showNotification("Download massal selesai!", "success");

    }



    function downloadSceneImage(sceneId, index) {

      const scene = scenes.find(s => s.id === sceneId);

      if(scene && scene.imageUrl) downloadImageRobust(scene.imageUrl, `FacePlayPro_Adegan_${index + 1}.png`);

      event.stopPropagation(); 

    }



    function downloadPreview() {

      if(currentPreviewUrl) downloadImageRobust(currentPreviewUrl, 'FacePlayPro_HighRes.png');

    }



    let currentPreviewUrl = null;

    function showNotification(msg, type = "info") {

      const toast = document.getElementById('toast'); document.getElementById('toast-msg').innerText = msg;

      toast.className = `fixed top-4 right-4 z-[70] px-6 py-3 rounded-lg shadow-lg font-medium transition-all duration-300 transform translate-y-0 opacity-100 ${type === 'error' ? 'bg-red-500 text-white' : 'bg-green-500 text-white'}`;

      setTimeout(() => { toast.classList.remove('translate-y-0', 'opacity-100'); toast.classList.add('translate-y-[-100px]', 'opacity-0'); }, 3000);

    }

    function openPreview(sceneId) { const scene = scenes.find(s => s.id === sceneId); if(scene && scene.imageUrl) openPreviewDirect(scene.imageUrl); }

    function openPreviewDirectById(faceId, type) {

      const face = faces.find(f => f.id === faceId);

      if(!face) return;

      const img = type === 'clothing' ? face.clothingImage : face.accessoriesImage;

      if(img) openPreviewDirect(img);

    }

    function downloadImageDirectById(faceId, type) {

      const face = faces.find(f => f.id === faceId);

      if(!face) return;

      const img = type === 'clothing' ? face.clothingImage : face.accessoriesImage;

      if(img) downloadImageRobust(img, `${type === 'clothing' ? 'Outfit' : 'Aksesoris'}_${face.name}.png`);

    }

    function openPreviewDirect(imageUrl) {

      if(!imageUrl || imageUrl === 'null' || imageUrl === '') return;

      currentPreviewUrl = imageUrl;

      document.getElementById('preview-img').src = currentPreviewUrl;

      document.getElementById('preview-modal').classList.remove('hidden-force');

    }

    function closePreview() { document.getElementById('preview-modal').classList.add('hidden-force'); currentPreviewUrl = null; }

  </script>
